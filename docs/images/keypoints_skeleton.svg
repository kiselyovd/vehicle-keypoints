<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640">
  <defs>
    <style>
      .car-body { fill: #f1faee; stroke: #1d3557; stroke-width: 2; }
      .car-roof { fill: #e8f5e9; stroke: #1d3557; stroke-width: 2; }
      .window { fill: #cfe5f5; stroke: #1d3557; stroke-width: 1; }
      .wheel-outer { fill: #37474F; stroke: #1d3557; stroke-width: 2; }
      .wheel-inner { fill: #9e9e9e; stroke: #1d3557; stroke-width: 1; }
      .edge { stroke: #f59e0b; stroke-width: 2.5; opacity: 0.85; }
      .kpt { fill: #06b6d4; stroke: #1d3557; stroke-width: 2; }
      .kpt-label { fill: white; font-family: Inter, sans-serif; font-size: 11px; font-weight: 700; text-anchor: middle; }
      .title-txt { fill: #1d3557; font-family: Inter, sans-serif; font-size: 22px; font-weight: 700; text-anchor: middle; }
      .legend-box { fill: #f1faee; stroke: #1d3557; stroke-width: 1.2; }
      .legend-txt { fill: #1d3557; font-family: "JetBrains Mono", Consolas, monospace; font-size: 12px; }
      .hint-txt { fill: #6b7280; font-family: Inter, sans-serif; font-size: 13px; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="white"/>

  <!-- Title -->
  <text x="600" y="48" class="title-txt">CarFusion · 14 anatomical keypoints + 18 skeleton edges</text>
  <text x="600" y="74" class="hint-txt">YOLO26-pose trains this layout end-to-end via <tspan font-family="monospace" fill="#1d3557">kpt_shape: [14, 3]</tspan></text>

  <!-- Car body -->
  <rect x="180" y="240" width="580" height="120" rx="30" class="car-body"/>
  <polygon points="290,240 380,170 580,170 670,240" class="car-roof"/>
  <polygon points="310,235 385,180 470,180 470,235" class="window"/>
  <polygon points="485,180 575,180 650,235 485,235" class="window"/>

  <!-- Wheels -->
  <circle cx="230" cy="385" r="42" class="wheel-outer"/>
  <circle cx="230" cy="385" r="17" class="wheel-inner"/>
  <circle cx="720" cy="385" r="42" class="wheel-outer"/>
  <circle cx="720" cy="385" r="17" class="wheel-inner"/>

  <!-- Skeleton edges (drawn before keypoints to be underneath) -->
  <!-- kpt positions:
    0 FL wheel 230,370   1 FR wheel 720,370
    2 RL wheel 230,400   3 RR wheel 720,400
    4 FL light 130,260   5 FR light 120,280
    6 RL light 800,260   7 RR light 810,280
    8 Front bumper 95,300   9 Rear bumper 840,300
    10 L mirror 220,195   11 R mirror 720,195
    12 Front plate 110,335   13 Rear plate 820,335
  -->
  <g class="edge">
    <line x1="230" y1="370" x2="230" y2="400"/>
    <line x1="720" y1="370" x2="720" y2="400"/>
    <line x1="230" y1="370" x2="720" y2="370"/>
    <line x1="230" y1="400" x2="720" y2="400"/>

    <line x1="840" y1="300" x2="720" y2="195"/>
    <line x1="220" y1="195" x2="110" y2="335"/>
    <line x1="840" y1="300" x2="220" y2="195"/>
    <line x1="720" y1="195" x2="110" y2="335"/>

    <line x1="130" y1="260" x2="230" y2="370"/>
    <line x1="130" y1="260" x2="840" y2="300"/>
    <line x1="130" y1="260" x2="120" y2="280"/>
    <line x1="120" y1="280" x2="720" y2="370"/>
    <line x1="120" y1="280" x2="220" y2="195"/>

    <line x1="800" y1="260" x2="230" y2="400"/>
    <line x1="800" y1="260" x2="720" y2="195"/>
    <line x1="810" y1="280" x2="720" y2="400"/>
    <line x1="810" y1="280" x2="110" y2="335"/>
    <line x1="800" y1="260" x2="810" y2="280"/>
  </g>

  <!-- Keypoints with numbers -->
  <g>
    <circle cx="230" cy="370" r="15" class="kpt"/><text x="230" y="375" class="kpt-label">0</text>
    <circle cx="720" cy="370" r="15" class="kpt"/><text x="720" y="375" class="kpt-label">1</text>
    <circle cx="230" cy="400" r="15" class="kpt"/><text x="230" y="405" class="kpt-label">2</text>
    <circle cx="720" cy="400" r="15" class="kpt"/><text x="720" y="405" class="kpt-label">3</text>
    <circle cx="130" cy="260" r="15" class="kpt"/><text x="130" y="265" class="kpt-label">4</text>
    <circle cx="120" cy="280" r="15" class="kpt"/><text x="120" y="285" class="kpt-label">5</text>
    <circle cx="800" cy="260" r="15" class="kpt"/><text x="800" y="265" class="kpt-label">6</text>
    <circle cx="810" cy="280" r="15" class="kpt"/><text x="810" y="285" class="kpt-label">7</text>
    <circle cx="95" cy="300" r="15" class="kpt"/><text x="95" y="305" class="kpt-label">8</text>
    <circle cx="840" cy="300" r="15" class="kpt"/><text x="840" y="305" class="kpt-label">9</text>
    <circle cx="220" cy="195" r="15" class="kpt"/><text x="220" y="200" class="kpt-label">10</text>
    <circle cx="720" cy="195" r="15" class="kpt"/><text x="720" y="200" class="kpt-label">11</text>
    <circle cx="110" cy="335" r="15" class="kpt"/><text x="110" y="340" class="kpt-label">12</text>
    <circle cx="820" cy="335" r="15" class="kpt"/><text x="820" y="340" class="kpt-label">13</text>
  </g>

  <!-- Legend box -->
  <rect x="900" y="455" width="260" height="160" rx="10" class="legend-box"/>
  <g class="legend-txt">
    <text x="920" y="480">0. FL wheel       7. RR light</text>
    <text x="920" y="500">1. FR wheel       8. Front bumper</text>
    <text x="920" y="520">2. RL wheel       9. Rear bumper</text>
    <text x="920" y="540">3. RR wheel      10. L mirror</text>
    <text x="920" y="560">4. FL light      11. R mirror</text>
    <text x="920" y="580">5. FR light      12. Front plate</text>
    <text x="920" y="600">6. RL light      13. Rear plate</text>
  </g>

  <!-- Axis note bottom -->
  <text x="600" y="615" class="hint-txt">Skeleton edges are a fixed topology: OKS-mAP compares predicted vs GT kpt positions under this graph</text>
</svg>
