site_name: vehicle-keypoints
site_description: Production-grade vehicle keypoint detection (14 anatomical car keypoints, CarFusion).
repo_url: https://github.com/kiselyovd/vehicle-keypoints
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.suggest
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_if_no_docstring: false
            members_order: source
            filters: ["!^_"]
            heading_level: 3
            line_length: 80
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - tables
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Training: training.md
  - Serving: serving.md
  - Benchmarks: BENCHMARKS.md
  - Reproducibility: REPRODUCIBILITY.md
  - Limitations: LIMITATIONS.md
  - Synthetic pre-training: phase0/synthetic-pretraining.md
  - API reference: api.md
