defaults:
  - _self_

trainer:
  max_epochs: 30
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  log_every_n_steps: 10
  enable_checkpointing: true
  deterministic: "warn"

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-3
  weight_decay: 1.0e-4

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: 30
  eta_min: 1.0e-5

batch_size: 16
num_workers: 4
